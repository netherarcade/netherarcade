<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Nether Arcade – Home</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <meta name="description" content="Welcome to Nether Arcade. Fun minigames, creative builds, and a great community await you!">
    <meta property="og:title" content="Nether Arcade – Home">
    <meta property="og:description" content="Welcome to Nether Arcade. Fun minigames, creative builds, and a great community await you!">
    <meta property="og:image" content="logo.png">
    <meta property="og:url" content="https://netherarcade.qzz.io">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="style/main-style.css">
</head>

<body>
    <!-- Banner -->
    <div class="banner-wrap">
        <img class="banner-img" src="minecraft banner.webp" alt="Nether Arcade Banner" loading="lazy">
        <div class="banner-fade"></div>
    </div>
    <!-- Navigation -->
    <nav>
        <nav>
            <a href="index">Home</a>
            <a href="about">Team</a>
            <a class="active" href="minigame.html">Mini-Game</a>
            <a href="socials.html">Socials</a>
        </nav>
    </nav>
    <div id="user-info" style="position: fixed; top: 10px; left: 10px; font-family: sans-serif;"></div>
    <!-- Firebase SDKs for showing user info and logout -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";


  import {


    getAuth,


    onAuthStateChanged,


    signOut


  } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";





  // Your Firebase config


  const firebaseConfig = {


    apiKey: "AIzaSyAHWjE1igMxmPQ65hivDN7ioNsBSB7nl7U",


    authDomain: "tester-f4444.firebaseapp.com",


    projectId: "tester-f4444",


    storageBucket: "tester-f4444.firebasestorage.app",


    messagingSenderId: "588985084600",


    appId: "1:588985084600:web:64816acb4d654f9a4ae24d"


  };





  // Initialize Firebase


  const app = initializeApp(firebaseConfig);


  const auth = getAuth(app);





  const userInfoDiv = document.getElementById("user-info");





  onAuthStateChanged(auth, (user) => {


    if (user) {


      const name = user.displayName || user.email;





      userInfoDiv.innerHTML = `


        <div style="background: #1e1e22; padding: 6px 12px; border-radius: 6px; display: inline-block;">


          <i class="fa-solid fa-circle-user"></i> <strong>${name}</strong>


          <button id="logoutBtn" style="margin-left: 10px; padding: 3px 8px; font-size: 0.9rem;">Logout</button>


        </div>


      `;





      // Logout


      document.getElementById("logoutBtn").addEventListener("click", () => {


        signOut(auth).then(() => {


          window.location.reload();


        });


      });





    } else {


      // Not logged in


      userInfoDiv.innerHTML = `


        <a href="Login/index.html" style="color: var(--subtle); background: #1e1e22; padding: 6px 12px; border-radius: 6px; text-decoration: none;">


          Click here to log in Login


        </a>


      `;


    }


  });


</script>
    <main>
        <section id="home">
            <div class="divider">─────────﹒˗ˏˋ ✩ ˎˊ˗﹒─────────</div>
            <h1><i class="fa-solid fa-fire"></i> Welcome to Nether Arcade</h1>
            <p>Fun minigames, creative builds, and a great community await you!</p>
            <!-- Server IP Box -->
            <div class="ip-box" onclick="copyIP()">
                <span>netherarcade.cold00.eu</span>
                <div style="font-size:0.85rem; color:var(--subtle);">Java Edition only • Version 1.21.11</div>
                <span class="tooltip" id="tip">Copied!</span>
            </div>
            <div class="divider">─────────﹒˗ˏˋ ✩ ˎˊ˗﹒─────────</div>
        </section>
    </main>
    <footer>
        &copy; <span id="yr"></span> Nether Arcade &nbsp;•&nbsp; Not affiliated with Mojang
    </footer>
    <script>
    function copyIP() {


        const ip = "netherarcade.cold00.eu";


        navigator.clipboard.writeText(ip).then(() => {


            const box = document.querySelector(".ip-box");


            box.classList.add("copied");


            setTimeout(() => box.classList.remove("copied"), 2000);


        });


    }


    document.getElementById("yr").textContent = new Date().getFullYear();
    </script>
</body>

</html>
